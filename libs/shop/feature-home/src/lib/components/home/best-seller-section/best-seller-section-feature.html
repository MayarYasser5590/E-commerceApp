<section class="bg-white text-white py-2 md:py-0">
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-[25%_74%] gap-2">
    <!-- LEFT CONTENT -->
    <div class="space-y-4 pt-1 flex flex-col pe-2 justify-between">
      <div class="content">
        <span class="text-pink-500 tracking-widest font-medium text-[16px]">
          BEST SELLING
        </span>

        <h2 class="text-[30px] pt-3 text-[#741C21] font-bold leading-tight">
          <span class="text-pink-300">Check Out</span> What Everyone’s
          <span class="text-pink-300">Buying</span> Right Now
        </h2>

        <p class="text-gray-500 pt-1 text-[12px] md:text-[16px]">
          Not sure what to choose? Start with our best sellers, these are the
          gifts our customers keep coming back for. Whether you're celebrating a
          birthday, anniversary or wedding, our top picks are guaranteed to
          leave a lasting impression.
        </p>
      </div>
      <div>
        <lib-button
          label="Explore gifts →"
          variant="custom"
          size="md"
          customClass="bg-[#A6252A] text-white py-[7px] px-[16px] rounded-[10px] hover:bg-[#8c1f23] transition"
        >
        </lib-button>
      </div>
    </div>

    <!-- RIGHT SLIDER -->
    <div>
      <p-carousel
        class="best-seller-carousel"
        [value]="bestSellers()"
        [numVisible]="3"
        [circular]="false"
        [autoplayInterval]="4000"
        [responsiveOptions]="responsiveOptions"
      >
        <ng-template pTemplate="item" let-product>
          <div class="px-3 w-full">
            <lib-product-card-organism [product]="product">
            </lib-product-card-organism>
          </div>
        </ng-template>
      </p-carousel>
    </div>
  </div>
</section>
